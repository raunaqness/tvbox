version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ~/.config/rclone/rclone.conf:/root/.config/rclone/rclone.conf:ro
    depends_on:
      - aria2c
      - prowlarr
    env_file:
      - .env
    environment:
      - ARIA2C_HOST=aria2c
      - ARIA2C_PORT=6800
      - ARIA2C_SECRET=${ARIA2C_SECRET:-changeme}
      - PROWLARR_URL=http://prowlarr:9696

  aria2c:
    image: p3terx/aria2-pro
    container_name: aria2c
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK_SET=022
      - RPC_SECRET=${ARIA2C_SECRET:-changeme}
      - RPC_PORT=6800
    ports:
      - "6800:6800"
      - "6888:6888"
      - "6888:6888/udp"
    volumes:
      - ./downloads:/downloads
      - ./aria2-config:/config
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    ports:
      - "9696:9696"
    volumes:
      - ./prowlarr-config:/config
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=Etc/UTC
    ports:
      - "8191:8191"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    env_file:
      - .env
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
