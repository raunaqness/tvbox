<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Auto-Stream</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f172a; color: white; margin: 0; }
        .login-box { background: #1e293b; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        input { padding: 0.5rem; border-radius: 4px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 1rem; width: 100%; box-sizing: border-box; }
        button { width: 100%; padding: 0.5rem; border: none; border-radius: 4px; background: #6366f1; color: white; cursor: pointer; }
        .error { color: #ef4444; margin-bottom: 1rem; font-size: 0.875rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <form action="/login" method="post">
            <input type="password" name="password" placeholder="Password" required autofocus>
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <button type="submit">Unlock</button>
        </form>
    </div>
</body>
</html>
